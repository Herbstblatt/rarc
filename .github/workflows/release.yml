name: Build and Release rarc Binaries

on:
  push:
    tags:
      - 'v*.*.*'  # Release on version tags like v1.0.0

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          
          - os: macos
            arch: x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build rarc
        run: cargo build -p rarc --release --target ${{ matrix.target }}
      
      - name: Create archive
        shell: bash
        run: |
          mkdir -p rarc-dist/bin
          cp target/${{ matrix.target }}/release/rarc rarc-dist/bin/
          cp INSTALL.md rarc-dist/
          tar -czf rarc-${{ matrix.os }}-${{ matrix.arch }}.tar.gz rarc-dist/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rarc-${{ matrix.os }}-${{ matrix.arch }}
          path: rarc-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Prepare release assets
        run: |
          mkdir release-assets
          for dir in rarc-*/; do
            mv "$dir"/*.tar.gz release-assets/
          done
          ls -lh release-assets/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*.tar.gz
          body: |
            # Release ${{ github.ref_name }}
            
            Pre-built binaries for rarc compiler.
            
            ## Installation
            
            Download the appropriate binary for your system:
            - `rarc-linux-x86_64.tar.gz` - Linux x86_64
            - `rarc-macos-x86_64.tar.gz` - macOS Intel
            
            Then extract and install:
            ```bash
            tar -xzf rarc-linux-x86_64.tar.gz
            sudo cp rarc-dist/bin/rarc /usr/local/bin/
            ```
            
            Or use the installation script:
            ```bash
            ./install.sh
            ```
            
            See INSTALL.md for detailed instructions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
